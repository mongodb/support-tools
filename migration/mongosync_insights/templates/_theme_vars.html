<!-- FOUC prevention: apply saved theme before paint -->
<script>
(function(){
    var t=sessionStorage.getItem('mi_theme')||'light';
    if(t==='system'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
    document.documentElement.setAttribute('data-theme',t);
    sessionStorage.removeItem('mi_color_scheme');
})();
</script>

<script>
function resolveTheme(pref) {
    if (pref === 'system') {
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    return pref === 'dark' ? 'dark' : 'light';
}

function applyAppearance(themePref) {
    var theme = resolveTheme(themePref);
    document.documentElement.setAttribute('data-theme', theme);
    document.dispatchEvent(new CustomEvent('mi-theme-changed', { detail: { theme: theme } }));
    syncThemeToggleButton();
}

function toggleMiTheme() {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    sessionStorage.setItem('mi_theme', next);
    applyAppearance(next);
}

function syncThemeToggleButton() {
    var btn = document.getElementById('themeToggleBtn');
    if (!btn) return;
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var label = isDark ? 'Switch to light mode' : 'Switch to dark mode';
    btn.title = label;
    btn.setAttribute('aria-label', label);
    btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    var tooltip = btn.querySelector('.tooltip');
    if (tooltip) {
        tooltip.textContent = isDark ? 'Light mode' : 'Dark mode';
    }
}

(function() {
    sessionStorage.removeItem('mi_color_scheme');
    var savedTheme = sessionStorage.getItem('mi_theme') || 'light';
    applyAppearance(savedTheme);

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', syncThemeToggleButton);
    } else {
        syncThemeToggleButton();
    }

    if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
            var themePref = sessionStorage.getItem('mi_theme');
            if (themePref === 'system') {
                applyAppearance('system');
            }
        });
    }
})();
</script>
