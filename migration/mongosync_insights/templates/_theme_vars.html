<!-- FOUC prevention: apply saved theme before paint -->
<script>
(function(){
    var t=sessionStorage.getItem('mi_theme')||'light';
    var s=sessionStorage.getItem('mi_color_scheme')||'green';
    if(t==='system'){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
    document.documentElement.setAttribute('data-theme',t);
    document.documentElement.setAttribute('data-scheme',s);
})();
</script>

<script>
function resolveTheme(pref) {
    if (pref === 'system') {
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    return pref === 'dark' ? 'dark' : 'light';
}

function applyAppearance(themePref, colorScheme) {
    var theme = resolveTheme(themePref);
    var scheme = (colorScheme && ['green','blue','slate','ocean'].indexOf(colorScheme) !== -1) ? colorScheme : 'green';
    document.documentElement.setAttribute('data-theme', theme);
    document.documentElement.setAttribute('data-scheme', scheme);
}

(function() {
    var savedTheme = sessionStorage.getItem('mi_theme') || 'light';
    var savedScheme = sessionStorage.getItem('mi_color_scheme') || 'green';
    applyAppearance(savedTheme, savedScheme);

    if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
            var themePref = sessionStorage.getItem('mi_theme');
            if (themePref === 'system') {
                applyAppearance('system', sessionStorage.getItem('mi_color_scheme') || 'green');
            }
        });
    }
})();
</script>
